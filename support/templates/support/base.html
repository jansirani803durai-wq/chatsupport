{% load static %}<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>{% block title %}SupportSphere{% endblock %}</title><link rel='stylesheet' href='{% static "support/style.css" %}'></head><body><header><a href='{% url "ticket_list" %}'>SupportSphere</a><nav>{% if user.is_authenticated %}<a href='{% url "ticket_list" %}'>Tickets</a><a href='{% url "create_ticket" %}'>Create</a>{% if user.staff_profile %}<a href='{% url "staff_dashboard" %}'>Staff Queue</a><a href='{% url "my_tickets" %}'>My Tickets</a>{% endif %}<form method='post' action='{% url "logout" %}'>{% csrf_token %}<button>Logout</button></form>{% endif %}</nav></header><main>{% for m in messages %}<div class='alert'>{{m}}</div>{% endfor %}{% block content %}{% endblock %}</main></body></html>
