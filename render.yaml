databases:
  - name: chat-support-db
    plan: free
    databaseName: chat_support
    user: chat_support_user

services:
  - type: web
    name: chat-support-system
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn support_system.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /accounts/login/
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://*.onrender.com
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: DATABASE_URL
        fromDatabase:
          name: chat-support-db
          property: connectionString
